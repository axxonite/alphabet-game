<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Alphabet Game</title>
<script src="https://cdn.jsdelivr.net/npm/vosk-browser@0.0.8/dist/vosk.js"></script>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #fafafa; font-family: system-ui, sans-serif; }
  body { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4vh; }
  #word { display: flex; gap: 2vw; max-width: 96vw; justify-content: center; }
  .letter {
    /* Scales by --letter-count (set per-render) so 7-letter words fit one line. */
    font-size: min(22vh, calc(85vw / var(--letter-count, 3) - 2vw));
    font-weight: 700;
    text-transform: uppercase;
    color: #bbb;
    transition: color 0.2s, transform 0.2s;
  }
  .letter.current { color: #1976d2; transform: scale(1.15); }
  .letter.done { color: #2e7d32; }
  #status { font-size: 3vh; color: #555; min-height: 4vh; text-align: center; padding: 0 2vw; }
  #heard { font-size: 2vh; color: #888; min-height: 3vh; font-style: italic; }
  #controls { display: flex; gap: 1vw; }
  button {
    font-size: 2.5vh; padding: 1vh 3vw; border: none; border-radius: 1vh;
    background: #1976d2; color: white; cursor: pointer;
  }
  button.secondary { background: #888; }
  button:disabled { background: #ccc; cursor: not-allowed; }
  #reward { font-size: 12vh; min-height: 14vh; }
  #progress { position: fixed; top: 1vh; right: 2vw; font-size: 1.8vh; color: #999; }
</style>
</head>
<body>

<div id="progress"></div>
<div id="reward"></div>
<div id="word"></div>
<div id="status">Press Start and say each letter</div>
<div id="heard"></div>
<div id="controls">
  <button id="startBtn">Start</button>
  <button id="nextBtn" class="secondary">New Word</button>
  <button id="modeBtn" class="secondary" title="Strict requires a clearer match; Lenient accepts common recognizer confusions (M↔N, B↔P, D↔T); Letters-only locks Vosk to letter homophones"></button>
  <button id="difficultyBtn" class="secondary" title="Word length: 3 / 5 / 7 letters"></button>
</div>

<script>
// ---- Word lists by difficulty (length) ----
// Each tier holds words of exactly that length. Difficulty setting picks tier.
const WORD_TIERS = {
  3: [
    // short a
    "cat","bat","hat","map","cap","bag","ham","jam","ran","dad","van","fan",
    // short e
    "bed","red","hen","pen","ten","leg","web","jet","yes","get",
    // short i
    "pig","big","sit","hit","pin","win","tip","kid","lip","fix",
    // short o
    "dog","log","hot","pot","top","box","fox","hop","mom","mop",
    // short u
    "cup","sun","run","bus","mud","hug","bug","nut",
  ],
  5: [
    "apple","happy","smile","water","bread","house","mouse","plant","table","chair",
    "beach","light","music","party","stone","snake","tiger","lemon","sugar","candy",
    "jelly","sweet","tooth","brush","paint","dance","magic","story","truck","train",
    "horse","pizza","sleep","green","black","white","brown","cloud","grass","berry",
    "dream","skate","crown","queen","tower","fairy","robot","clown","cream",
  ],
  7: [
    "rainbow","dolphin","penguin","balloon","kitchen","cookies","monkeys","country",
    "history","bicycle","holiday","flowers","animals","freedom","kingdom","picture",
    "popcorn","sandbox","sunbeam","bedroom","weekend","morning","evening","library",
    "octopus","pumpkin","unicorn","rockets","village","blanket","sandals","cupcake",
    "diamond","emerald","sausage","biscuit","captain","journey","mystery","perfume",
  ],
};
// Compatibility: a few code paths reference WORDS directly. Keep it pointed at
// the active tier (set inside setDifficulty).
let WORDS = WORD_TIERS[3];

// ---- Phoneme-based letter matching ----
// Vosk emits dictionary words. CMU dict gives each word a canonical phoneme
// sequence. We compare those phonemes against each letter name's known
// pronunciation, which generalizes across mishearings without enumerating
// every surface form (H ← "eight"/"ate"/"ace" all fall out of one rule).
const LETTER_PHONEMES = {
  a: ["EY"],         b: ["B","IY"],     c: ["S","IY"],     d: ["D","IY"],
  e: ["IY"],         f: ["EH","F"],     g: ["JH","IY"],    h: ["EY","CH"],
  i: ["AY"],         j: ["JH","EY"],    k: ["K","EY"],     l: ["EH","L"],
  m: ["EH","M"],     n: ["EH","N"],     o: ["OW"],         p: ["P","IY"],
  q: ["K","Y","UW"], r: ["AA","R"],     s: ["EH","S"],     t: ["T","IY"],
  u: ["Y","UW"],     v: ["V","IY"],     w: ["D","AH","B","AH","L","Y","UW"],
  x: ["EH","K","S"], y: ["W","AY"],     z: ["Z","IY"],
};

// The stressed (loudest) vowel of each letter name — the acoustic anchor.
const LETTER_STRESS = {
  a:"EY", b:"IY", c:"IY", d:"IY", e:"IY", f:"EH", g:"IY", h:"EY",
  i:"AY", j:"EY", k:"EY", l:"EH", m:"EH", n:"EH", o:"OW", p:"IY",
  q:"UW", r:"AA", s:"EH", t:"IY", u:"UW", v:"IY", w:"UW",
  x:"EH", y:"AY", z:"IY",
};

const VOWELS = new Set(["AA","AE","AH","AO","AW","AY","EH","ER","EY","IH","IY","OW","OY","UH","UW"]);

// Vowels that recognizers and kids confuse with each other. AE/EH/AH are
// notoriously interchangeable; IY/IH likewise. Keep these tight — wider
// equivalence classes increase false positives.
const STRESS_EQUIVALENT = {
  EY: ["EY","EH","AE"],
  IY: ["IY","IH"],
  EH: ["EH","AE","AH","IH"],
  AY: ["AY"],
  OW: ["OW","AO","AH","UH"],
  UW: ["UW","UH"],
  AA: ["AA","AO","AH"],
};

// For vowel-initial letters that end in a consonant (F/H/L/M/N/S/X), the heard
// word must contain a phoneme acoustically close to the target's trailing
// consonant. Without this, every short word starting with EH falsely matches
// every EH-vowel letter (e.g. "s"→F, bare schwa "a"→F/L/M/N/S/X).
// CH's class is broad on purpose — H←"eight"/"ate"/"ace" needs T/S/etc.
const STRICT_TARGET_CONS_EQUIVALENT = {
  F:  ["F","V"],
  CH: ["CH","T","JH","D","SH","S","Z","TH","DH"],
  L:  ["L"],
  M:  ["M"],
  N:  ["N","NG"],
  S:  ["S","Z","SH","ZH","TH"],
};
// Lenient mode adds nasal cross-equivalence (M↔N): recognizers routinely
// swap them on kid speech because they differ only in articulation place.
const LENIENT_TARGET_CONS_EQUIVALENT = {
  ...STRICT_TARGET_CONS_EQUIVALENT,
  M: ["M","N","NG"],
  N: ["N","M","NG"],
};
// Lenient mode also accepts voicing-pair confusions in cons-init letters:
// kid says B, recognizer often emits "pee" or "p"; same for D↔T.
const LENIENT_HEARD_CONS_EQUIVALENT = {
  B: ["B","P"], P: ["P","B"],
  D: ["D","T"], T: ["T","D"],
};

// Letters-only mode constrains Vosk's vocabulary to canonical letter names so
// the decoder is forced to pick a letter for any utterance — no detours through
// "moon" / "the" / "ham". Trade-off: background noise gets assigned to whichever
// letter sounds closest, instead of being rejected. Includes H mishearings
// (eight/ate/ace) because "aitch" isn't in CMU dict and H needs *something*.
const LETTERS_ONLY_GRAMMAR_WORDS = [
  "a","ay",
  "b","be","bee",
  "c","see","sea","cee",
  "d","dee",
  "e","ee",
  "f",
  "g","gee","jee",
  "h","eight","ate","ace","aid","age",
  "i","eye","aye",
  "j","jay",
  "k","kay","okay",
  "l","el",
  "m","em",
  "n","en",
  "o","oh","owe",
  "p","pee","pea",
  "q","cue","queue",
  "r","are",
  "s","es","ess",
  "t","tea","tee",
  "u","you","ewe",
  "v","vee","ve",
  "w","double",
  "x","ex",
  "y","why","wye",
  "z","zee",
];

// Multi-word tokens that can't be looked up in the phoneme dict — only W has these.
const W_COMBOS = new Set(["double u", "double you", "doubleu", "doubleyou", "dub"]);
const TWO_WORD_COMBOS = new Set(["double u", "double you"]);

// Loaded asynchronously from phonemes.json at startup.
let PHONEMES = null;

function wordPhonemes(word) {
  const p = PHONEMES?.[word];
  return p ? p : null;
}

function matchesExpected(word, expectedLetter) {
  // Fast path: heard token IS the literal letter character (Vosk can emit "a","b",...).
  if (word === expectedLetter) return true;
  // W spoken as "double u" / "double you" comes through as a combined token.
  if (expectedLetter === "w" && W_COMBOS.has(word)) return true;

  const heard = wordPhonemes(word);
  if (!heard) return false;
  const target = LETTER_PHONEMES[expectedLetter];
  const stressEquiv = STRESS_EQUIVALENT[LETTER_STRESS[expectedLetter]];

  // 1. Stressed-vowel gate: heard must contain the target's stressed vowel
  //    (or an acoustically close cousin like AE for EH).
  if (!heard.some(p => stressEquiv.includes(p))) return false;

  // letters-only and lenient share the permissive matcher; only strict tightens.
  const lenient = pronunciationMode !== "strict";
  const lettersOnly = pronunciationMode === "letters-only";
  const targetConsTable = lenient
    ? LENIENT_TARGET_CONS_EQUIVALENT
    : STRICT_TARGET_CONS_EQUIVALENT;

  // 2. Onset constraint depends on whether the letter name starts with a consonant.
  // Letters-only mode skips the *onset* check (so kid's E heard as "bee"
  // still advances), but the trailing-cons rule below always runs so that
  // F/L/M/N/S/X stay distinguishable from each other and from A/E/I/O.
  if (!VOWELS.has(target[0])) {
    if (!lettersOnly) {
      // Consonant-initial letter (B/C/D/F/G/J/K/L/M/N/P/Q/R/S/T/V/W/Y/Z):
      // heard's first consonant must equal the target's. Skip leading vowels
      // so "okay" [OW,K,EY] still matches K. This is what stops "be" [B,IY]
      // from falsely matching D — they share IY but onsets differ.
      const heardFirstCons = heard.find(p => !VOWELS.has(p));
      const heardEquiv = lenient ? LENIENT_HEARD_CONS_EQUIVALENT[target[0]] : null;
      const onsetOk = heardEquiv
        ? heardEquiv.includes(heardFirstCons)
        : heardFirstCons === target[0];
      if (!onsetOk) return false;
    }
  } else {
    if (!lettersOnly) {
      // Vowel-initial letter (A/E/H/I/O/U/X): heard must START with the same
      // vowel (or stress-equivalent). Stops short consonant-initial words from
      // matching every vowel-initial letter that happens to share a vowel.
      if (!stressEquiv.includes(heard[0])) return false;
    }
    // Trailing-cons rule (runs in all modes): if target ends in a consonant,
    // that consonant (or a cousin) must appear in heard. Stops "s"→F,
    // "a"→F/L/M/N/S/X, and (in letters-only) "el"→M / "ex"→N false positives.
    const targetCons = target.filter(p => !VOWELS.has(p));
    if (targetCons.length > 0) {
      const last = targetCons[targetCons.length - 1];
      const cousins = targetConsTable[last] || [last];
      if (!heard.some(p => cousins.includes(p))) return false;
    }
  }

  // 3. Length sanity: heard shouldn't dwarf the target.
  if (heard.length > target.length + 2) return false;

  return true;
}

function buildGrammar() {
  // Letters-only mode: hard-bias Vosk to emit a letter name for every utterance.
  if (pronunciationMode === "letters-only") {
    const set = new Set(LETTERS_ONLY_GRAMMAR_WORDS);
    for (let c = 97; c <= 122; c++) set.add(String.fromCharCode(c));
    return [...set, "[unk]"];
  }
  // Strict / Lenient: broad grammar covering every dict word the matcher would
  // accept for some letter. Always computed under lenient semantics (the wider
  // set), so toggling Strict↔Lenient at runtime never trips on a missing word.
  const savedMode = pronunciationMode;
  pronunciationMode = "lenient";
  try {
    const set = new Set();
    for (let c = 97; c <= 122; c++) set.add(String.fromCharCode(c));
    set.add("double"); set.add("you"); set.add("u");
    if (PHONEMES) {
      const letters = "abcdefghijklmnopqrstuvwxyz";
      for (const w of Object.keys(PHONEMES)) {
        for (let i = 0; i < 26; i++) {
          if (matchesExpected(w, letters[i])) { set.add(w); break; }
        }
      }
    }
    return [...set, "[unk]"];
  } finally {
    pronunciationMode = savedMode;
  }
}

function tokenizeWithCombos(cleaned) {
  const words = cleaned.split(" ");
  const tokens = [];
  for (let i = 0; i < words.length; i++) {
    if (i + 1 < words.length) {
      const combo = words[i] + " " + words[i + 1];
      if (TWO_WORD_COMBOS.has(combo)) { tokens.push(combo); i++; continue; }
    }
    tokens.push(words[i]);
  }
  return tokens;
}

// ---- DOM ----
const wordEl = document.getElementById("word");
const statusEl = document.getElementById("status");
const heardEl = document.getElementById("heard");
const rewardEl = document.getElementById("reward");
const progressEl = document.getElementById("progress");
const startBtn = document.getElementById("startBtn");
const nextBtn = document.getElementById("nextBtn");
const modeBtn = document.getElementById("modeBtn");
const difficultyBtn = document.getElementById("difficultyBtn");

const MODEL_URL = "models/vosk-model-small-en-us-0.15.tar.gz";

let currentWord = "";
let currentIdx = 0;
let usedWords = new Set();
let difficulty = parseInt(localStorage.getItem("alphabet-game.difficulty") || "3", 10);
if (!WORD_TIERS[difficulty]) difficulty = 3;
WORDS = WORD_TIERS[difficulty];
let listening = false;
let voskReady = false;
let voskLoading = false;
let voskRecognizer = null;
let audioCtx = null;
let micStream = null;
let pronunciationMode = localStorage.getItem("alphabet-game.pronunciationMode") || "lenient";

function setListeningUI(on) {
  startBtn.textContent = on ? "Stop" : "Start";
}

function getAudioCtx() {
  if (!audioCtx) {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (AC) audioCtx = new AC();
  }
  if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
  return audioCtx;
}

function playTone(ctx, freq, start, dur, type = "triangle", peak = 0.25) {
  const t0 = ctx.currentTime + start;
  const osc = ctx.createOscillator();
  const g = ctx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t0);
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(peak, t0 + 0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  osc.connect(g).connect(ctx.destination);
  osc.start(t0);
  osc.stop(t0 + dur + 0.05);
}

function playFanfare() {
  const ctx = getAudioCtx();
  if (!ctx) return;
  // C major arpeggio up, then high octave sparkle
  const notes = [523.25, 659.25, 783.99, 1046.50]; // C5 E5 G5 C6
  notes.forEach((f, i) => playTone(ctx, f, i * 0.12, 0.35, "triangle", 0.28));
  // Sparkle on top
  playTone(ctx, 1568.0, 0.55, 0.5, "sine", 0.18); // G6
  playTone(ctx, 2093.0, 0.7, 0.6, "sine", 0.15);  // C7
}

function pickWord() {
  if (usedWords.size >= WORDS.length) usedWords.clear();
  const candidates = WORDS.filter(w => !usedWords.has(w));
  const w = candidates[Math.floor(Math.random() * candidates.length)];
  usedWords.add(w);
  return w;
}

function renderWord() {
  wordEl.innerHTML = "";
  wordEl.style.setProperty("--letter-count", currentWord.length);
  for (let i = 0; i < currentWord.length; i++) {
    const span = document.createElement("span");
    span.className = "letter" + (i < currentIdx ? " done" : i === currentIdx ? " current" : "");
    span.textContent = currentWord[i];
    wordEl.appendChild(span);
  }
  progressEl.textContent = `Word ${usedWords.size} / ${WORDS.length}`;
}

function newWord() {
  currentWord = pickWord();
  currentIdx = 0;
  rewardEl.textContent = "";
  statusEl.textContent = `Say the letters: ${currentWord.toUpperCase().split("").join(" ")}`;
  heardEl.textContent = "";
  renderWord();
}

function reward() {
  const emojis = ["⭐","🎉","🌟","🏆","🎊","💖","🦄","🌈"];
  rewardEl.textContent = emojis[Math.floor(Math.random() * emojis.length)].repeat(3);
  statusEl.textContent = `Great job! You spelled ${currentWord.toUpperCase()}!`;
  playFanfare();
  setTimeout(newWord, 2500);
}

function processTranscript(text) {
  heardEl.textContent = `Heard: "${text}"`;
  const cleaned = text.toLowerCase().replace(/[^a-z\s]/g, " ").replace(/\s+/g, " ").trim();
  if (!cleaned || currentIdx >= currentWord.length) return;

  const tokens = tokenizeWithCombos(cleaned);
  for (const tok of tokens) {
    if (currentIdx >= currentWord.length) break;
    if (matchesExpected(tok, currentWord[currentIdx])) {
      currentIdx++;
      renderWord();
      if (currentIdx === currentWord.length) {
        reward();
        return;
      }
    }
  }
}

async function downloadWithProgress(url, onProgress) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status} fetching model`);
  const total = Number(res.headers.get("Content-Length")) || 0;
  const totalMb = total ? (total / 1048576).toFixed(0) : null;
  const reader = res.body.getReader();
  const chunks = [];
  let received = 0;
  let lastUpdate = 0;
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    chunks.push(value);
    received += value.length;
    const now = performance.now();
    if (now - lastUpdate > 100) {
      lastUpdate = now;
      const pct = total ? Math.round((received / total) * 100) : 0;
      const mb = (received / 1048576).toFixed(1);
      onProgress(pct, mb, totalMb);
    }
  }
  onProgress(100, (received / 1048576).toFixed(1), totalMb);
  const blob = new Blob(chunks, { type: "application/gzip" });
  return URL.createObjectURL(blob);
}

async function initVosk() {
  if (voskReady || voskLoading) return voskReady;
  if (typeof Vosk === "undefined") {
    statusEl.textContent = "Speech library failed to load. Check your connection.";
    return false;
  }
  if (!navigator.mediaDevices?.getUserMedia || !window.AudioWorklet) {
    statusEl.textContent = "Speech input is not supported in this browser.";
    return false;
  }
  voskLoading = true;
  startBtn.disabled = true;
  startBtn.textContent = "Loading…";
  try {
    if (!PHONEMES) {
      statusEl.textContent = "Loading phoneme dictionary…";
      const dictRes = await fetch("phonemes.json");
      if (!dictRes.ok) throw new Error(`HTTP ${dictRes.status} fetching phonemes.json`);
      PHONEMES = await dictRes.json();
    }
    statusEl.textContent = "Downloading speech model… 0%";
    const modelObjectUrl = await downloadWithProgress(MODEL_URL, (pct, mb, totalMb) => {
      statusEl.textContent = totalMb
        ? `Downloading speech model… ${pct}% (${mb} / ${totalMb} MB)`
        : `Downloading speech model… ${mb} MB`;
    });
    statusEl.textContent = "Unpacking speech model…";
    const channel = new MessageChannel();
    const model = await Vosk.createModel(modelObjectUrl);
    model.registerPort(channel.port1);

    const ctx = getAudioCtx();
    const sampleRate = ctx.sampleRate;
    // Constrain Vosk's vocabulary to words that the phoneme matcher would
    // accept for *some* letter — narrows recognizer output without us having
    // to hand-curate the list. Single letter chars + W combo seeds always in.
    const grammar = JSON.stringify(buildGrammar());
    const recognizer = new model.KaldiRecognizer(sampleRate, grammar);
    recognizer.setWords(true);
    recognizer.on("result", (m) => {
      if (!listening) return;
      processTranscript(m.result?.text || "");
    });
    recognizer.on("partialresult", (m) => {
      if (!listening) return;
      // Letters-only relaxes the matcher so much that B/C/D/E/G/P/T/V/Z all
      // accept any IY-class word. If we processed partials AND finals, a
      // single "bee" utterance could advance two letters in a row. Only
      // act on finalized results in this mode.
      if (pronunciationMode === "letters-only") return;
      processTranscript(m.result?.partial || "");
    });
    voskRecognizer = recognizer;

    statusEl.textContent = "Connecting microphone…";
    micStream = await navigator.mediaDevices.getUserMedia({
      video: false,
      audio: {
        echoCancellation: false,
        noiseSuppression: true,
        autoGainControl: false,
        channelCount: 1,
      },
    });
    await ctx.audioWorklet.addModule("recognizer-processor.js");
    const node = new AudioWorkletNode(ctx, "recognizer-processor", {
      channelCount: 1, numberOfInputs: 1, numberOfOutputs: 1,
    });
    node.port.postMessage({ action: "init", recognizerId: recognizer.id }, [channel.port2]);
    ctx.createMediaStreamSource(micStream).connect(node);
    node.connect(ctx.destination);

    voskReady = true;
    statusEl.textContent = currentWord
      ? `Say the letters: ${currentWord.toUpperCase().split("").join(" ")}`
      : "Ready. Press Start.";
    return true;
  } catch (err) {
    console.error(err);
    statusEl.textContent = `Speech setup failed: ${err.message || err}`;
    return false;
  } finally {
    voskLoading = false;
    startBtn.disabled = false;
  }
}

startBtn.addEventListener("click", async () => {
  getAudioCtx();
  if (!voskReady) {
    const ok = await initVosk();
    if (!ok) return;
  }
  listening = !listening;
  setListeningUI(listening);
  if (listening && !currentWord) newWord();
});

nextBtn.addEventListener("click", newWord);

const MODE_CYCLE = ["lenient", "strict", "letters-only"];
const MODE_LABEL = { "lenient": "Lenient", "strict": "Strict", "letters-only": "Letters-only" };
function renderModeBtn() {
  modeBtn.textContent = MODE_LABEL[pronunciationMode] || "Lenient";
}
modeBtn.addEventListener("click", () => {
  const wasLettersOnly = pronunciationMode === "letters-only";
  const idx = MODE_CYCLE.indexOf(pronunciationMode);
  pronunciationMode = MODE_CYCLE[(idx + 1) % MODE_CYCLE.length];
  localStorage.setItem("alphabet-game.pronunciationMode", pronunciationMode);
  renderModeBtn();
  // Grammar (Letters-only vs broad) is fixed at Vosk init. If we just crossed
  // that boundary and Vosk is already running, the change takes effect on reload.
  const isLettersOnly = pronunciationMode === "letters-only";
  if (voskReady && (wasLettersOnly !== isLettersOnly)) {
    statusEl.textContent = "Reload the page to apply the vocabulary change.";
  }
});
renderModeBtn();

const DIFFICULTY_CYCLE = [3, 5, 7];
function renderDifficultyBtn() {
  difficultyBtn.textContent = `${difficulty}-letter`;
}
difficultyBtn.addEventListener("click", () => {
  const idx = DIFFICULTY_CYCLE.indexOf(difficulty);
  difficulty = DIFFICULTY_CYCLE[(idx + 1) % DIFFICULTY_CYCLE.length];
  localStorage.setItem("alphabet-game.difficulty", String(difficulty));
  WORDS = WORD_TIERS[difficulty];
  usedWords.clear();
  renderDifficultyBtn();
  newWord();
});
renderDifficultyBtn();

setListeningUI(false);
newWord();
</script>
</body>
</html>
